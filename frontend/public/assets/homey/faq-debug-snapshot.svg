<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Debug snapshot overview</title>
  <desc id="desc">Illustration showing Copy Debug Snapshot, Open In Browser, and sanitized JSON details.</desc>
  <rect width="720" height="420" rx="28" fill="#0b111d" />
  <rect x="54" y="42" width="612" height="336" rx="24" fill="#121d30" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="88" y="84" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Debug</text>
  <text x="88" y="110" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Capture the PI state, selected device, and recent events without exposing raw secrets.</text>

  <rect x="88" y="136" width="210" height="38" rx="19" fill="#182847" />
  <text x="121" y="160" fill="#edf6ff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Copy Debug Snapshot</text>
  <rect x="314" y="136" width="176" height="38" rx="19" fill="#1f3148" />
  <text x="353" y="160" fill="#edf6ff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Open In Browser</text>
  <rect x="506" y="136" width="126" height="38" rx="19" fill="#163526" />
  <text x="535" y="160" fill="#effff5" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Reapply Saved</text>

  <rect x="88" y="196" width="544" height="144" rx="20" fill="#0d1523" stroke="#7ce8d7" stroke-opacity="0.14" />
  <text x="112" y="226" fill="#8db4d9" font-family="Consolas, 'Courier New', monospace" font-size="15">"globalSettings": { "hasAddress": true, "hasApiKey": true },</text>
  <text x="112" y="252" fill="#8db4d9" font-family="Consolas, 'Courier New', monospace" font-size="15">"currentActionSettings": { "deviceId": "...", "capabilityId": "measure_power" },</text>
  <text x="112" y="278" fill="#8db4d9" font-family="Consolas, 'Courier New', monospace" font-size="15">"selection": { "device": { "name": "Grid Meter" }, "capability": { "unit": "W" } },</text>
  <text x="112" y="304" fill="#8db4d9" font-family="Consolas, 'Courier New', monospace" font-size="15">"events": [ "send-to-plugin", "copy-debug", "probe-connection" ]</text>

  <text x="88" y="364" fill="#98accc" font-family="Segoe UI, Arial, sans-serif" font-size="12">Raw Homey address and API key are redacted. The snapshot reports presence flags and sanitized settings instead.</text>
</svg>
