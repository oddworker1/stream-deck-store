<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Action mode comparison</title>
  <desc id="desc">Illustration comparing Toggle Device, Set Device State, and target percentage input for dimmers and covers.</desc>
  <rect width="720" height="420" rx="28" fill="#0b1220" />
  <rect x="48" y="46" width="624" height="328" rx="24" fill="#121d30" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="82" y="88" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Actions</text>
  <text x="82" y="114" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Choose the press behavior by outcome: simple flip, exact value, or target percentage.</text>

  <rect x="82" y="146" width="170" height="168" rx="20" fill="#132034" stroke="#7ce8d7" stroke-opacity="0.16" />
  <text x="104" y="182" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Toggle Device</text>
  <text x="104" y="210" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Best for plugs, lights, and clean on/off states.</text>
  <rect x="104" y="236" width="124" height="34" rx="17" fill="#173328" />
  <text x="129" y="258" fill="#effff5" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Press = flip state</text>

  <rect x="274" y="146" width="170" height="168" rx="20" fill="#132034" stroke="#57b9ff" stroke-opacity="0.2" />
  <text x="296" y="182" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Set Device State</text>
  <text x="296" y="210" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Use exact boolean, number, or text values.</text>
  <rect x="296" y="236" width="126" height="34" rx="17" fill="#1b3150" />
  <text x="316" y="258" fill="#edf6ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Value type = Number</text>

  <rect x="466" y="146" width="170" height="168" rx="20" fill="#132034" stroke="#ff8268" stroke-opacity="0.24" />
  <text x="488" y="182" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Target %</text>
  <text x="488" y="210" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">For dimmers and covers. Enter 0-100 in the PI.</text>
  <rect x="488" y="236" width="126" height="34" rx="17" fill="#3b2332" />
  <text x="511" y="258" fill="#fff0f4" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Target % = 65</text>

  <rect x="82" y="330" width="554" height="20" rx="10" fill="#0e1522" />
  <text x="92" y="344" fill="#98accc" font-family="Segoe UI, Arial, sans-serif" font-size="12">If the numeric field is missing, check the action, capability, and value type first.</text>
</svg>
