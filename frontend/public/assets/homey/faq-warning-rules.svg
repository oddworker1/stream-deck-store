<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Warning rule examples</title>
  <desc id="desc">Illustration showing separate over and under warning rules with thresholds, flash, and styling.</desc>
  <rect width="720" height="420" rx="28" fill="#0c1321" />
  <rect x="54" y="42" width="612" height="336" rx="24" fill="#111b2c" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="88" y="84" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Warnings</text>
  <text x="88" y="110" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Over and under rules are independent, so one tile can react to both extremes.</text>

  <rect x="88" y="142" width="250" height="186" rx="20" fill="#2b1b23" stroke="#ff8268" stroke-opacity="0.28" />
  <text x="112" y="178" fill="#fff2ef" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Warning over</text>
  <text x="112" y="204" fill="#f5b7ac" font-family="Segoe UI, Arial, sans-serif" font-size="14">Power greater than 4000</text>
  <rect x="112" y="226" width="122" height="32" rx="16" fill="#7a1c24" />
  <text x="134" y="247" fill="#fff4f2" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Input: Primary</text>
  <rect x="112" y="270" width="168" height="32" rx="16" fill="#47191e" />
  <text x="133" y="291" fill="#fff4f2" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Flash: 800 ms for 10 s</text>

  <rect x="382" y="142" width="250" height="186" rx="20" fill="#182847" stroke="#57b9ff" stroke-opacity="0.28" />
  <text x="406" y="178" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Warning under</text>
  <text x="406" y="204" fill="#9dd0ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Temperature less than 18</text>
  <rect x="406" y="226" width="136" height="32" rx="16" fill="#17386d" />
  <text x="428" y="247" fill="#eef5ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Compare type: Number</text>
  <rect x="406" y="270" width="178" height="32" rx="16" fill="#1e3155" />
  <text x="428" y="291" fill="#eef5ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Secondary value is also supported</text>

  <text x="88" y="352" fill="#98accc" font-family="Segoe UI, Arial, sans-serif" font-size="12">Numeric rules use the rendered numeric value, including 0-100 percentage scales.</text>
</svg>
