<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Homey setup overview</title>
  <desc id="desc">Illustration showing Homey address, Personal Access Token, and connected status in the setup tab.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c1321" />
      <stop offset="100%" stop-color="#16233a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#17263d" />
      <stop offset="100%" stop-color="#0f1a2a" />
    </linearGradient>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)" />
  <circle cx="635" cy="88" r="84" fill="#7ce8d7" opacity="0.13" />
  <circle cx="118" cy="340" r="110" fill="#57b9ff" opacity="0.08" />
  <rect x="56" y="40" width="608" height="340" rx="24" fill="#0a1019" opacity="0.66" />
  <rect x="76" y="64" width="568" height="292" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="108" y="106" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Setup</text>
  <text x="108" y="132" fill="#93a6c3" font-family="Segoe UI, Arial, sans-serif" font-size="14">One working connection is shared across Homey actions.</text>

  <rect x="108" y="160" width="504" height="56" rx="16" fill="#122033" stroke="#7ce8d7" stroke-opacity="0.18" />
  <text x="130" y="182" fill="#8db4d9" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">HOMEY ADDRESS</text>
  <text x="130" y="204" fill="#eff7ff" font-family="Consolas, 'Courier New', monospace" font-size="18">https://homeypro.local</text>

  <rect x="108" y="230" width="504" height="56" rx="16" fill="#122033" stroke="#57b9ff" stroke-opacity="0.2" />
  <text x="130" y="252" fill="#8db4d9" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">PERSONAL ACCESS TOKEN</text>
  <text x="130" y="274" fill="#eff7ff" font-family="Consolas, 'Courier New', monospace" font-size="18">pat_live_xxxx_xxxx_xxxx</text>

  <rect x="108" y="302" width="232" height="30" rx="15" fill="#123327" />
  <circle cx="128" cy="317" r="6" fill="#79f2b1" />
  <text x="143" y="322" fill="#effff6" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Connected to Homey Pro.</text>

  <rect x="380" y="302" width="232" height="30" rx="15" fill="#2b2140" />
  <text x="399" y="322" fill="#efe9ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Global settings reused by every key</text>
</svg>
