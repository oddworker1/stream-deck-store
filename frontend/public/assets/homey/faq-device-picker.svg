<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Device and capability picker overview</title>
  <desc id="desc">Illustration showing advanced search filters, device selection, capability selection, and optional second value.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#10192b" />
      <stop offset="100%" stop-color="#0a111d" />
    </linearGradient>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)" />
  <rect x="54" y="44" width="612" height="332" rx="24" fill="#111a29" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="88" y="88" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Select</text>
  <text x="88" y="114" fill="#9db0ca" font-family="Segoe UI, Arial, sans-serif" font-size="14">Start with the device, then confirm the capability and optional second value.</text>

  <rect x="88" y="140" width="544" height="44" rx="14" fill="#0e1522" />
  <rect x="102" y="152" width="130" height="20" rx="10" fill="#1a2940" />
  <text x="116" y="166" fill="#dbe9ff" font-family="Segoe UI, Arial, sans-serif" font-size="12">Room: Kitchen</text>
  <rect x="246" y="152" width="168" height="20" rx="10" fill="#1a2940" />
  <text x="260" y="166" fill="#dbe9ff" font-family="Segoe UI, Arial, sans-serif" font-size="12">Capability: Temperature</text>
  <rect x="428" y="152" width="124" height="20" rx="10" fill="#1a2940" />
  <text x="442" y="166" fill="#dbe9ff" font-family="Segoe UI, Arial, sans-serif" font-size="12">Favorites only</text>

  <rect x="88" y="204" width="544" height="56" rx="16" fill="#132034" stroke="#7ce8d7" stroke-opacity="0.18" />
  <text x="110" y="226" fill="#8db4d9" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">HOMEY DEVICE</text>
  <text x="110" y="248" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="19">Kitchen Climate Sensor - Kitchen</text>

  <rect x="88" y="274" width="264" height="56" rx="16" fill="#132034" stroke="#57b9ff" stroke-opacity="0.2" />
  <text x="110" y="296" fill="#8db4d9" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">CAPABILITY</text>
  <text x="110" y="318" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Temperature (measure_temperature)</text>

  <rect x="368" y="274" width="264" height="56" rx="16" fill="#132034" stroke="#ff8268" stroke-opacity="0.26" />
  <text x="390" y="296" fill="#8db4d9" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">SECOND VALUE</text>
  <text x="390" y="318" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Humidity (measure_humidity)</text>
</svg>
